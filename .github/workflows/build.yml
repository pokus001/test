name: Build ESPHome firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ESPHome firmware
        uses: esphome/build-action@v1
        with:
          yaml_file: uart-bridge.yaml

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .esphome/build/*.bin
